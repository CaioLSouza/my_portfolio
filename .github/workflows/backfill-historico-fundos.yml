name: Backfill historico de fundos ANBIMA/CVM

on:
  workflow_dispatch:
    inputs:
      meses:
        description: "Quantidade de meses (incluindo o atual) para backfill"
        required: false
        default: "12"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r boletim_fundos_anbima/requirements.txt

      - name: Baixar historico de N meses
        run: python boletim_fundos_anbima/baixar_historico.py --meses "${{ github.event.inputs.meses }}"

      - name: Atualizar classificacao ANBIMA dos fundos
        run: python boletim_fundos_anbima/cadastro.py

      - name: Gerar series de AuM e captacao por classe
        run: python boletim_fundos_anbima/analise_classes.py

      - name: Commitar resultados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add boletim_fundos_anbima/resultados/ boletim_fundos_anbima/cadastro/
          git diff --cached --quiet || git commit -m "Backfill do historico de AuM e captacao por classe (CVM/ANBIMA)"
          git push
